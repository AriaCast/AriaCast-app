/*
 * genimage config — Pi Zero 2W (64-bit, Image, bcm2837-rpi-zero-2-w.dtb)
 *
 * SD layout:
 *   p1  64 MB  FAT32  (boot)
 *   p2 256 MB  ext4   (rootfs)
 */

image boot.vfat {
    vfat {
        label = "boot"
        files = {
            "rpi-firmware/bootcode.bin",
            "rpi-firmware/start.elf",
            "rpi-firmware/fixup.dat",
            "rpi-firmware/config.txt",
            "rpi-firmware/cmdline.txt",
            "rpi-firmware/bcm2837-rpi-zero-2-w.dtb",
            "Image"
        }
    }
    size = 64M
}

image sdcard.img {
    hdimage {
        gpt = false
    }

    partition boot {
        partition-type = 0xC
        bootable = true
        image = "boot.vfat"
    }

    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
    }
}
