/*
 * genimage config — Pi Zero W (32-bit, zImage, bcm2835-rpi-zero-w.dtb)
 *
 * SD layout:
 *   p1  64 MB  FAT32  (boot)   — kernel, DTB, RPi firmware
 *   p2 256 MB  ext4   (rootfs)
 */

image boot.vfat {
    vfat {
        label = "boot"
        files = {
            "rpi-firmware/bootcode.bin",
            "rpi-firmware/start.elf",
            "rpi-firmware/fixup.dat",
            "rpi-firmware/config.txt",
            "rpi-firmware/cmdline.txt",
            "bcm2835-rpi-zero-w.dtb",
            "zImage"
        }
    }
    size = 64M
}

image sdcard.img {
    hdimage {
        gpt = false
    }

    partition boot {
        partition-type = 0xC   /* FAT32 LBA */
        bootable = true
        image = "boot.vfat"
    }

    partition rootfs {
        partition-type = 0x83  /* Linux */
        image = "rootfs.ext4"
    }
}
