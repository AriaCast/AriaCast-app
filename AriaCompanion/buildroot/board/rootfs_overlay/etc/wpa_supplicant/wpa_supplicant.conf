ctrl_interface=/var/run/wpa_supplicant
ctrl_interface_group=0
update_config=1
country=IT

# ── Edit this block with your WiFi credentials before building ───────────────
network={
    ssid="YourNetworkName"
    psk="YourPassword"
    key_mgmt=WPA-PSK
    priority=1
}
# ─────────────────────────────────────────────────────────────────────────────
# You can also edit this file on the SD boot partition after flashing,
# then reboot the Pi.
